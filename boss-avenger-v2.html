<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BOSS清算者</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: #0a0a0a;
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        /* 页面切换 */
        .page { display: none; }
        .page.active { display: block; }
        
        /* ========== 首页 - 第一版风格 ========== */
        .home-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            text-align: center;
        }
        
        .main-title {
            font-size: clamp(2.5rem, 8vw, 4rem);
            font-weight: bold;
            background: linear-gradient(135deg, #e74c3c, #f39c12);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        
        .sub-title {
            color: #666;
            font-size: 1.1rem;
            margin-bottom: 40px;
        }
        
        .input-card {
            background: linear-gradient(135deg, #1a1a1a, #0d0d0d);
            border: 2px solid #333;
            border-radius: 15px;
            padding: 30px;
            width: 100%;
            max-width: 500px;
            margin-bottom: 30px;
        }
        
        .input-card label {
            display: block;
            color: #e74c3c;
            font-size: 1.1rem;
            margin-bottom: 15px;
            font-weight: bold;
        }
        
        .input-card input {
            width: 100%;
            padding: 15px 20px;
            background: rgba(0,0,0,0.5);
            border: 2px solid #444;
            border-radius: 10px;
            color: #fff;
            font-size: 1.1rem;
            text-align: center;
            outline: none;
            transition: all 0.3s;
        }
        
        .input-card input:focus {
            border-color: #e74c3c;
            box-shadow: 0 0 20px rgba(231, 76, 60, 0.3);
        }
        
        .crime-box {
            text-align: left;
            margin-top: 20px;
        }
        
        .crime-box h3 {
            color: #e74c3c;
            font-size: 0.95rem;
            margin-bottom: 12px;
        }
        
        .crime-item {
            padding: 10px 12px;
            margin: 8px 0;
            background: rgba(231, 76, 60, 0.1);
            border-left: 3px solid #e74c3c;
            border-radius: 5px;
            font-size: 0.9rem;
            color: #ccc;
        }
        
        .start-btn {
            padding: 16px 50px;
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            border: none;
            border-radius: 30px;
            color: #fff;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 5px 20px rgba(231, 76, 60, 0.4);
        }
        
        .start-btn:active {
            transform: scale(0.96);
        }
        
        /* ========== 战斗页 ========== */
        .battle-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 10px;
        }
        
        /* 顶部工具栏 */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 5px;
            margin-bottom: 10px;
        }
        
        .combo-display {
            display: flex;
            align-items: baseline;
            gap: 5px;
        }
        
        .combo-num {
            font-size: 2rem;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .combo-num.show { opacity: 1; }
        
        .combo-text {
            font-size: 0.9rem;
            color: #f39c12;
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .combo-text.show { opacity: 1; }
        
        .top-controls {
            display: flex;
            gap: 8px;
        }
        
        .top-btn {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: rgba(0,0,0,0.6);
            border: 2px solid rgba(255,255,255,0.2);
            color: #fff;
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        
        .top-btn.active {
            background: #e74c3c;
            border-color: #e74c3c;
            box-shadow: 0 0 15px rgba(231, 76, 60, 0.5);
        }
        
        /* 战斗区域 */
        .battle-arena {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: linear-gradient(180deg, #1a1a1a 0%, #0d0d0d 100%);
            border: 2px solid #333;
            border-radius: 12px;
            overflow: hidden;
        }
        
        /* 敌人区域 */
        .enemy-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            min-height: 200px;
        }
        
        .enemy-avatar {
            font-size: clamp(5rem, 15vw, 7rem);
            filter: drop-shadow(0 0 25px rgba(231, 76, 60, 0.5));
            transition: transform 0.1s;
            margin-bottom: 10px;
        }
        
        .enemy-avatar.hit {
            animation: enemyHit 0.3s ease;
        }
        
        @keyframes enemyHit {
            0%, 100% { transform: scale(1) rotate(0); }
            25% { transform: scale(0.9) rotate(-10deg); }
            50% { transform: scale(1.05) rotate(10deg); }
            75% { transform: scale(0.95) rotate(-5deg); }
        }
        
        .enemy-name {
            font-size: clamp(1.3rem, 4vw, 1.6rem);
            color: #e74c3c;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .enemy-level {
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 15px;
        }
        
        .enemy-hp-box {
            width: 100%;
            max-width: 350px;
        }
        
        .hp-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: #e74c3c;
            margin-bottom: 5px;
        }
        
        .hp-bar-bg {
            height: 20px;
            background: rgba(0,0,0,0.5);
            border: 2px solid #333;
            border-radius: 10px;
            overflow: hidden;
        }
        
        .hp-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #e74c3c, #ff6b6b);
            border-radius: 8px;
            transition: width 0.2s ease;
        }
        
        /* VS分隔 */
        .vs-divider {
            text-align: center;
            padding: 10px;
            font-size: 1.2rem;
            color: #f39c12;
            font-weight: bold;
            background: rgba(0,0,0,0.3);
        }
        
        /* 玩家区域 */
        .player-area {
            padding: 15px;
            background: rgba(52, 152, 219, 0.05);
            border-top: 1px solid rgba(52, 152, 219, 0.2);
        }
        
        .player-info {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }
        
        .player-avatar {
            font-size: 3rem;
            filter: drop-shadow(0 0 10px rgba(52, 152, 219, 0.5));
        }
        
        .player-status {
            flex: 1;
        }
        
        .player-name {
            font-size: 0.9rem;
            color: #3498db;
            margin-bottom: 3px;
        }
        
        .player-hp-text {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: #3498db;
            margin-bottom: 4px;
        }
        
        .player-hp-bar {
            height: 16px;
            background: rgba(0,0,0,0.5);
            border: 2px solid #333;
            border-radius: 8px;
            overflow: hidden;
        }
        
        .player-hp-fill {
            height: 100%;
            background: linear-gradient(90deg, #3498db, #5dade2);
            border-radius: 6px;
            transition: width 0.2s ease;
        }
        
        /* 攻击按钮 */
        .attack-area {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        
        .atk-btn {
            padding: 14px 8px;
            background: rgba(231, 76, 60, 0.15);
            border: 2px solid rgba(231, 76, 60, 0.4);
            border-radius: 10px;
            color: #fff;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.1s;
            text-align: center;
        }
        
        .atk-btn:active {
            transform: scale(0.95);
            background: rgba(231, 76, 60, 0.3);
        }
        
        .atk-btn.ult {
            background: rgba(155, 89, 182, 0.2);
            border-color: #9b59b6;
            grid-column: span 3;
            font-weight: bold;
            padding: 16px;
        }
        
        .atk-btn .icon { font-size: 1.2rem; margin-right: 4px; }
        .atk-btn .dmg { 
            display: block;
            font-size: 0.75rem;
            color: #e74c3c;
            margin-top: 3px;
        }
        
        /* 特效 */
        .damage-num {
            position: absolute;
            font-weight: bold;
            font-size: 2rem;
            pointer-events: none;
            animation: floatUp 0.8s ease forwards;
            z-index: 100;
        }
        
        .damage-num.crit {
            font-size: 2.8rem;
            color: #ffd700;
            text-shadow: 0 0 15px #ff6600;
        }
        
        @keyframes floatUp {
            0% { transform: translateY(0) scale(0.8); opacity: 1; }
            100% { transform: translateY(-80px) scale(1); opacity: 0; }
        }
        
        .taunt-bubble {
            position: fixed;
            top: 35%;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #f39c12, #e67e22);
            padding: 12px 25px;
            border-radius: 20px;
            font-size: 1.1rem;
            font-weight: bold;
            z-index: 200;
            animation: popIn 0.3s ease;
        }
        
        @keyframes popIn {
            0% { transform: translateX(-50%) scale(0); }
            50% { transform: translateX(-50%) scale(1.1); }
            100% { transform: translateX(-50%) scale(1); }
        }
        
        .flash-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(231, 76, 60, 0.25);
            opacity: 0;
            pointer-events: none;
            z-index: 50;
            transition: opacity 0.1s;
        }
        
        .flash-overlay.show { opacity: 1; }
        
        .shake { animation: shake 0.4s ease; }
        
        @keyframes shake {
            0%, 100% { transform: translate(0, 0); }
            20% { transform: translate(-8px, 4px); }
            40% { transform: translate(8px, -4px); }
            60% { transform: translate(-8px, -4px); }
            80% { transform: translate(8px, 4px); }
        }
        
        /* 弹窗 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.85);
            z-index: 500;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .modal-overlay.show { display: flex; }
        
        .modal {
            background: #1a1a1a;
            border: 2px solid #333;
            border-radius: 12px;
            padding: 20px;
            width: 100%;
            max-width: 400px;
            max-height: 80vh;
            overflow-y: auto;
        }
        
        .modal h3 {
            color: #e74c3c;
            margin-bottom: 15px;
            text-align: center;
        }
        
        .skill-row {
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
        }
        
        .skill-row h4 {
            color: #e74c3c;
            font-size: 0.85rem;
            margin-bottom: 8px;
        }
        
        .skill-row input {
            width: 100%;
            padding: 8px;
            margin-bottom: 6px;
            background: rgba(0,0,0,0.4);
            border: 1px solid #444;
            border-radius: 6px;
            color: #fff;
            font-size: 0.9rem;
        }
        
        .modal-close {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            background: #e74c3c;
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
            cursor: pointer;
        }
        
        /* 结束页 */
        .end-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            text-align: center;
        }
        
        .end-title {
            font-size: 2.5rem;
            color: #e74c3c;
            margin-bottom: 20px;
        }
        
        .end-emoji {
            font-size: 6rem;
            margin: 20px 0;
            filter: grayscale(1);
            animation: dead 1s ease infinite;
        }
        
        @keyframes dead {
            0%, 100% { transform: rotate(-3deg); }
            50% { transform: rotate(3deg); }
        }
        
        .end-text {
            color: #aaa;
            font-size: 1.1rem;
            line-height: 1.8;
            margin-bottom: 30px;
            max-width: 400px;
        }
        
        /* 响应式 */
        @media (max-width: 600px) {
            .input-card { padding: 20px; }
            .enemy-area { padding: 15px; min-height: 180px; }
            .player-info { gap: 10px; }
            .player-avatar { font-size: 2.5rem; }
            .attack-area { grid-template-columns: repeat(2, 1fr); }
            .atk-btn.ult { grid-column: span 2; }
            .top-btn { width: 36px; height: 36px; font-size: 1rem; }
        }
        
        @media (max-width: 400px) {
            .main-title { font-size: 2.2rem; }
            .enemy-avatar { font-size: 4rem; }
            .atk-btn { font-size: 0.85rem; padding: 12px 6px; }
        }
    </style>
</head>
<body>
    <div class="flash-overlay" id="flash"></div>
    
    <!-- 首页 -->
    <div class="page active" id="homePage">
        <div class="home-page">
            <div class="main-title">BOSS清算者</div>
            <div class="sub-title">抢怪仇人惩罚系统</div>
            
            <div class="input-card">
                <label>📝 输入抢你BOSS的仇人名字</label>
                <input type="text" id="enemyNameInput" placeholder="例如：霸服狂魔丶龙傲天" maxlength="15">
                
                <div class="crime-box">
                    <h3>📋 罪行清单（系统将自动清算）</h3>
                    <div class="crime-item">⚔️ 恶意抢夺世界BOSS归属权</div>
                    <div class="crime-item">😈 击杀后私信嘲讽羞辱</div>
                    <div class="crime-item">🚫 带人封锁BOSS刷新点</div>
                    <div class="crime-item">💬 世界频道散播谣言抹黑</div>
                </div>
            </div>
            
            <button class="start-btn" onclick="startGame()">开始清算</button>
        </div>
    </div>
    
    <!-- 战斗页 -->
    <div class="page" id="battlePage">
        <div class="battle-page">
            <!-- 顶部栏 -->
            <div class="top-bar">
                <div class="combo-display">
                    <span class="combo-num" id="comboNum">0</span>
                    <span class="combo-text" id="comboText">连击</span>
                </div>
                <div class="top-controls">
                    <button class="top-btn" id="btnInfinite" onclick="toggleInfinite()" title="无限血条">♾️</button>
                    <button class="top-btn" id="btnGod" onclick="toggleGod()" title="无敌模式">🛡️</button>
                    <button class="top-btn" onclick="openSkillModal()" title="技能设置">⚙️</button>
                </div>
            </div>
            
            <!-- 战斗区域 -->
            <div class="battle-arena">
                <!-- 敌人 -->
                <div class="enemy-area" id="enemyArea">
                    <div class="enemy-avatar" id="enemyAvatar">😈</div>
                    <div class="enemy-name" id="enemyNameDisplay">抢怪狗</div>
                    <div class="enemy-level">Lv.99 抢怪惯犯 · 全服公敌</div>
                    
                    <div class="enemy-hp-box">
                        <div class="hp-label">
                            <span>嚣张值</span>
                            <span id="enemyHpText">100/100</span>
                        </div>
                        <div class="hp-bar-bg">
                            <div class="hp-bar-fill" id="enemyHpBar" style="width: 100%"></div>
                        </div>
                    </div>
                </div>
                
                <!-- VS -->
                <div class="vs-divider">VS</div>
                
                <!-- 玩家 -->
                <div class="player-area">
                    <div class="player-info">
                        <div class="player-avatar" id="playerAvatar">😎</div>
                        <div class="player-status">
                            <div class="player-name">你</div>
                            <div class="player-hp-text">
                                <span>你的血量</span>
                                <span id="playerHpText">100/100</span>
                            </div>
                            <div class="player-hp-bar">
                                <div class="player-hp-fill" id="playerHpBar" style="width: 100%"></div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="attack-area" id="attackArea"></div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 结束页 -->
    <div class="page" id="endPage">
        <div class="end-page">
            <div class="end-title">清算完成</div>
            <div class="end-emoji">🤡</div>
            <div class="end-text" id="endMsg"></div>
            <button class="start-btn" onclick="restart()">再来一局</button>
        </div>
    </div>
    
    <!-- 技能弹窗 -->
    <div class="modal-overlay" id="skillModal">
        <div class="modal">
            <h3>⚙️ 自定义技能</h3>
            <div id="skillList"></div>
            <button class="modal-close" onclick="saveSkills()">保存</button>
        </div>
    </div>
    
    <script>
        // 技能配置
        let skills = [
            { name: '王八拳', damage: 15, icon: '👊' },
            { name: '夺命飞踢', damage: 22, icon: '🦶' },
            { name: '世界曝光', damage: 30, icon: '📢' },
            { name: '终极审判', damage: 50, icon: '⚡', ult: true }
        ];
        
        // 游戏状态
        let enemyName = '';
        let enemyHp = 100;
        let playerHp = 100;
        let combo = 0;
        let infiniteMode = false;
        let godMode = false;
        let gameOver = false;
        let lastAttackTime = 0;
        
        const taunts = ['就这？','你在给我挠痒痒吗？','太弱了！','BOSS是我的！','根本不疼！'];
        
        function startGame() {
            enemyName = document.getElementById('enemyNameInput').value.trim() || '抢怪狗';
            document.getElementById('enemyNameDisplay').textContent = enemyName;
            
            enemyHp = 100;
            playerHp = 100;
            combo = 0;
            gameOver = false;
            
            updateDisplay();
            renderButtons();
            
            document.getElementById('homePage').classList.remove('active');
            document.getElementById('battlePage').classList.add('active');
        }
        
        function renderButtons() {
            const area = document.getElementById('attackArea');
            area.innerHTML = '';
            
            skills.forEach((s, i) => {
                const btn = document.createElement('button');
                btn.className = s.ult ? 'atk-btn ult' : 'atk-btn';
                if (s.ult) {
                    btn.innerHTML = `${s.icon} ${s.name}`;
                } else {
                    btn.innerHTML = `<span class="icon">${s.icon}</span>${s.name}<span class="dmg">-${s.damage}</span>`;
                }
                btn.onclick = () => doAttack(i);
                area.appendChild(btn);
            });
        }
        
        function doAttack(idx) {
            if (gameOver) return;
            
            const skill = skills[idx];
            const now = Date.now();
            let damage = skill.damage;
            
            // 连击
            if (now - lastAttackTime < 1500) {
                combo++;
                damage = Math.floor(damage * (1 + combo * 0.12));
                showCombo();
            } else {
                combo = 1;
            }
            lastAttackTime = now;
            
            // 暴击
            const crit = Math.random() < 0.25;
            if (crit) damage = Math.floor(damage * 1.8);
            
            // 无限模式
            if (infiniteMode) enemyHp = 100;
            else enemyHp = Math.max(0, enemyHp - damage);
            
            // 特效
            showDamage(damage, crit);
            document.getElementById('flash').classList.add('show');
            setTimeout(() => document.getElementById('flash').classList.remove('show'), 100);
            document.body.classList.add('shake');
            setTimeout(() => document.body.classList.remove('shake'), 400);
            document.getElementById('enemyAvatar').classList.add('hit');
            setTimeout(() => document.getElementById('enemyAvatar').classList.remove('hit'), 300);
            
            updateDisplay();
            
            // 嘲讽
            if (Math.random() < 0.35) showTaunt(taunts[Math.floor(Math.random() * taunts.length)]);
            
            // 结束检查
            if (!infiniteMode && enemyHp <= 0) {
                setTimeout(endGame, 500);
                return;
            }
            
            // 反击
            if (Math.random() < 0.35) {
                setTimeout(enemyCounter, 400);
            }
            
            // 重置连击
            clearTimeout(window.comboTimer);
            window.comboTimer = setTimeout(() => { combo = 0; hideCombo(); }, 2000);
        }
        
        function enemyCounter() {
            if (gameOver) return;
            
            let dmg = Math.floor(Math.random() * 6) + 3;
            
            if (godMode) {
                dmg = 0;
                showTaunt('🛡️ 无敌！');
            }
            
            playerHp = Math.max(0, playerHp - dmg);
            updateDisplay();
            
            if (playerHp <= 0 && !godMode) {
                setTimeout(() => endGame(false), 500);
            }
        }
        
        function showCombo() {
            document.getElementById('comboNum').textContent = combo;
            document.getElementById('comboNum').classList.add('show');
            document.getElementById('comboText').classList.add('show');
        }
        
        function hideCombo() {
            document.getElementById('comboNum').classList.remove('show');
            document.getElementById('comboText').classList.remove('show');
        }
        
        function showDamage(dmg, crit) {
            const el = document.createElement('div');
            el.className = crit ? 'damage-num crit' : 'damage-num';
            el.style.color = crit ? '#ffd700' : '#e74c3c';
            el.textContent = crit ? `暴击! ${dmg}` : `-${dmg}`;
            
            const area = document.getElementById('enemyArea');
            el.style.left = '50%';
            el.style.top = '40%';
            el.style.transform = 'translateX(-50%)';
            
            area.appendChild(el);
            setTimeout(() => el.remove(), 800);
        }
        
        function showTaunt(text) {
            const el = document.createElement('div');
            el.className = 'taunt-bubble';
            el.textContent = text;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 1200);
        }
        
        function updateDisplay() {
            document.getElementById('enemyHpBar').style.width = (enemyHp/100*100) + '%';
            document.getElementById('enemyHpText').textContent = `${enemyHp}/100`;
            document.getElementById('playerHpBar').style.width = (playerHp/100*100) + '%';
            document.getElementById('playerHpText').textContent = `${playerHp}/100`;
            
            // 表情
            const av = document.getElementById('enemyAvatar');
            if (enemyHp > 70) av.textContent = '😈';
            else if (enemyHp > 40) av.textContent = '😤';
            else if (enemyHp > 0) av.textContent = '😰';
            else av.textContent = '🤡';
        }
        
        function toggleInfinite() {
            infiniteMode = !infiniteMode;
            document.getElementById('btnInfinite').classList.toggle('active', infiniteMode);
            showTaunt(infiniteMode ? '♾️ 无限血条开启' : '♾️ 无限血条关闭');
        }
        
        function toggleGod() {
            godMode = !godMode;
            document.getElementById('btnGod').classList.toggle('active', godMode);
            showTaunt(godMode ? '🛡️ 无敌模式开启' : '🛡️ 无敌模式关闭');
        }
        
        function openSkillModal() {
            const list = document.getElementById('skillList');
            list.innerHTML = '';
            skills.forEach((s, i) => {
                list.innerHTML += `
                    <div class="skill-row">
                        <h4>技能${i+1}${s.ult ? ' (必杀)' : ''}</h4>
                        <input type="text" id="sk${i}name" value="${s.name}" placeholder="名称">
                        <input type="number" id="sk${i}dmg" value="${s.damage}" placeholder="伤害">
                        <input type="text" id="sk${i}icon" value="${s.icon}" placeholder="图标">
                    </div>
                `;
            });
            document.getElementById('skillModal').classList.add('show');
        }
        
        function saveSkills() {
            skills.forEach((s, i) => {
                s.name = document.getElementById(`sk${i}name`).value || s.name;
                s.damage = parseInt(document.getElementById(`sk${i}dmg`).value) || s.damage;
                s.icon = document.getElementById(`sk${i}icon`).value || s.icon;
            });
            renderButtons();
            document.getElementById('skillModal').classList.remove('show');
            showTaunt('⚙️ 技能已更新');
        }
        
        function endGame(win = true) {
            gameOver = true;
            document.getElementById('battlePage').classList.remove('active');
            document.getElementById('endPage').classList.add('active');
            
            const msgs = win ? [
                `${enemyName} 已经被你打到删号退游！`,
                `经过你的"教育"，${enemyName} 再也不敢抢BOSS了！`,
                `${enemyName} 正在世界频道疯狂道歉！`
            ] : [
                `没想到 ${enemyName} 这么顽强...`,
                `虽然你倒下了，但精神永不灭！`
            ];
            document.getElementById('endMsg').textContent = msgs[Math.floor(Math.random() * msgs.length)];
        }
        
        function restart() {
            enemyHp = 100;
            playerHp = 100;
            combo = 0;
            gameOver = false;
            infiniteMode = false;
            godMode = false;
            document.getElementById('btnInfinite').classList.remove('active');
            document.getElementById('btnGod').classList.remove('active');
            document.getElementById('endPage').classList.remove('active');
            document.getElementById('homePage').classList.add('active');
        }
        
        // 回车开始
        document.getElementById('enemyNameInput').addEventListener('keypress', e => {
            if (e.key === 'Enter') startGame();
        });
    </script>
</body>
</html>
