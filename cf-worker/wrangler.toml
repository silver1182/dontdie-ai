name = "dontdie-guestbook"
main = "index.js"
compatibility_date = "2024-01-01"

# KV 命名空间配置
# 运行 wrangler kv:namespace create "GUESTBOOK_KV" 后，把 id 填到这里
[[kv_namespaces]]
binding = "GUESTBOOK_KV"
id = "你的_KV_ID_填在这里"

# 环境变量（通过 wrangler secret put 设置，不要写在这里）
# RESEND_API_KEY - Resend API Key（可选）
# NOTIFY_EMAIL - 接收通知的邮箱（可选）
