<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>股票监控助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #eaeaea;
            padding: 20px;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            padding: 30px 0;
        }
        
        .logo {
            font-size: 48px;
            margin-bottom: 10px;
        }
        
        h1 {
            font-size: 24px;
            background: linear-gradient(135deg, #6c5ce7, #fd79a8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #a0a0a0;
            font-size: 14px;
        }
        
        .status-bar {
            background: rgba(0, 206, 201, 0.1);
            border: 1px solid rgba(0, 206, 201, 0.3);
            border-radius: 12px;
            padding: 15px 20px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .status-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #00cec9;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .status-text {
            flex: 1;
        }
        
        .status-time {
            color: #a0a0a0;
            font-size: 12px;
        }
        
        .card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .card h2 {
            font-size: 18px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #a0a0a0;
        }
        
        input, select {
            width: 100%;
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: #fff;
            font-size: 16px;
            transition: all 0.3s;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #6c5ce7;
        }
        
        input::placeholder {
            color: #666;
        }
        
        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(108, 92, 231, 0.3);
        }
        
        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            margin-top: 10px;
        }
        
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        
        .stock-list {
            margin-top: 15px;
        }
        
        .stock-item {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .stock-info h3 {
            font-size: 16px;
            margin-bottom: 4px;
        }
        
        .stock-info p {
            font-size: 12px;
            color: #a0a0a0;
        }
        
        .stock-price {
            text-align: right;
        }
        
        .price {
            font-size: 18px;
            font-weight: 600;
        }
        
        .price.up { color: #00cec9; }
        .price.down { color: #e74c3c; }
        
        .change {
            font-size: 12px;
            color: #a0a0a0;
        }
        
        .delete-btn {
            background: rgba(231, 76, 60, 0.2);
            color: #e74c3c;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            margin-left: 10px;
        }
        
        .log {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            padding: 15px;
            font-family: monospace;
            font-size: 12px;
            max-height: 200px;
            overflow-y: auto;
            color: #a0a0a0;
        }
        
        .log-entry {
            margin-bottom: 5px;
            padding: 3px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        
        .hidden {
            display: none;
        }
        
        .alert {
            background: rgba(231, 76, 60, 0.1);
            border: 1px solid rgba(231, 76, 60, 0.3);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .alert-icon {
            font-size: 20px;
        }
        
        footer {
            text-align: center;
            padding: 20px;
            color: #666;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">📈</div>
            <h1>股票监控助手</h1>
            <p class="subtitle">自动监控 · 智能预警 · 实时推送</p>
        </header>
        
        <div class="status-bar">
            <div class="status-indicator" id="statusIndicator"></div>
            <div class="status-text" id="statusText">正在初始化...</div>
            <div class="status-time" id="statusTime"></div>
        </div>
        
        <!-- 添加股票表单 -->
        <div class="card">
            <h2>➕ 添加监控股票</h2>
            <form id="stockForm">
                <div class="row">
                    <div class="form-group">
                        <label>股票代码</label>
                        <input type="text" id="stockCode" placeholder="如: 600519" maxlength="6">
                    </div>
                    <div class="form-group">
                        <label>股票名称</label>
                        <input type="text" id="stockName" placeholder="如: 贵州茅台">
                    </div>
                </div>
                
                <div class="row">
                    <div class="form-group">
                        <label>成本价 (元)</label>
                        <input type="number" id="stockCost" placeholder="0.00" step="0.01">
                    </div>
                    <div class="form-group">
                        <label>持股数量</label>
                        <input type="number" id="stockShares" placeholder="0" min="0">
                    </div>
                </div>
                
                <div class="row">
                    <div class="form-group">
                        <label>止损线 (%)</label>
                        <input type="number" id="stopLoss" value="5" min="1" max="50">
                    </div>
                    <div class="form-group">
                        <label>止盈线 (%)</label>
                        <input type="number" id="stopGain" value="15" min="1" max="100">
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary">添加股票</button>
            </form>
        </div>
        
        <!-- 股票列表 -->
        <div class="card">
            <h2>📊 监控列表</h2>
            <div class="stock-list" id="stockList">
                <p style="color: #666; text-align: center; padding: 20px;">暂无股票，请添加</p>
            </div>
        </div>
        
        <!-- 飞书配置 -->
        <div class="card">
            <h2>📱 飞书通知设置</h2>
            <div class="form-group">
                <label>Webhook 地址（可选）</label>
                <input type="text" id="feishuWebhook" placeholder="https://open.feishu.cn/open-apis/bot/v2/hook/xxxxx">
            </div>
            <button class="btn btn-secondary" onclick="saveWebhook()">保存设置</button>
        </div>
        
        <!-- 运行日志 -->
        <div class="card">
            <h2>📝 运行日志</h2>
            <div class="log" id="log">
                <div class="log-entry">系统启动...</div>
            </div>
        </div>
        
        <footer>
            <p>Made with 🌸 by 路明非 | 不要死，活着就有希望</p>
        </footer>
    </div>
    
    <script>
        let stocks = [];
        let monitoring = false;
        let stockQuotes = {}; // 存储实时股价
        
        // 加载已有配置
        async function loadConfig() {
            try {
                const res = await fetch('/api/config');
                const data = await res.json();
                stocks = data.stocks || [];
                renderStockList();
                updateStatus('就绪，等待启动');
            } catch (e) {
                log('配置加载失败: ' + e.message);
            }
        }
        
        // 添加股票
        document.getElementById('stockForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const stock = {
                code: document.getElementById('stockCode').value,
                name: document.getElementById('stockName').value,
                cost: parseFloat(document.getElementById('stockCost').value) || 0,
                shares: parseInt(document.getElementById('stockShares').value) || 0,
                stopLoss: parseInt(document.getElementById('stopLoss').value) || 5,
                stopGain: parseInt(document.getElementById('stopGain').value) || 15,
                notify: true
            };
            
            if (!stock.code || !stock.name) {
                alert('请填写股票代码和名称');
                return;
            }
            
            stocks.push(stock);
            await saveConfig();
            renderStockList();
            
            // 立即获取这只股票的行情
            setTimeout(() => fetchQuotes(), 500);
            
            // 清空表单
            document.getElementById('stockForm').reset();
            document.getElementById('stopLoss').value = 5;
            document.getElementById('stopGain').value = 15;
            
            log(`添加股票: ${stock.name} (${stock.code})`);
        });
        
        // 保存配置
        async function saveConfig() {
            try {
                await fetch('/api/config', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ stocks })
                });
            } catch (e) {
                log('保存失败: ' + e.message);
            }
        }
        
        // 删除股票
        async function deleteStock(index) {
            const stock = stocks[index];
            stocks.splice(index, 1);
            await saveConfig();
            renderStockList();
            log(`删除股票: ${stock.name}`);
        }
        
        // 渲染股票列表
        function renderStockList() {
            const container = document.getElementById('stockList');
            if (stocks.length === 0) {
                container.innerHTML = '<p style="color: #666; text-align: center; padding: 20px;">暂无股票，请添加</p>';
                return;
            }
            
            container.innerHTML = stocks.map((stock, index) => {
                const quote = stockQuotes[stock.code];
                let priceHtml = '<span style="color: #666; font-size: 12px;">获取中...</span>';
                
                if (quote) {
                    const priceClass = quote.changePercent >= 0 ? 'up' : 'down';
                    const changeStr = quote.changePercent >= 0 ? '+' : '';
                    priceHtml = `
                        <div class="price ${priceClass}">¥${quote.price.toFixed(2)}</div>
                        <div class="change">${changeStr}${quote.changePercent}% | 盈亏: ${calculateProfit(stock, quote)}</div>
                    `;
                }
                
                return `
                <div class="stock-item" data-code="${stock.code}">
                    <div class="stock-info">
                        <h3>${stock.name} ${stock.notify ? '🔔' : ''}</h3>
                        <p>${stock.code} · 成本 ¥${stock.cost} · 止损-${stock.stopLoss}% · 止盈+${stock.stopGain}%</p>
                    </div>
                    <div class="stock-price">
                        ${priceHtml}
                    </div>
                    <div>
                        <button class="delete-btn" onclick="deleteStock(${index})">删除</button>
                    </div>
                </div>
            `}).join('');
        }
        
        // 计算盈亏
        function calculateProfit(stock, quote) {
            if (!stock.cost || stock.cost <= 0) return '未设置成本';
            const profit = ((quote.price - stock.cost) / stock.cost * 100).toFixed(2);
            const emoji = profit >= 0 ? '📈' : '📉';
            return `${emoji} ${profit >= 0 ? '+' : ''}${profit}%`;
        }
        
        // 保存飞书设置
        async function saveWebhook() {
            const webhook = document.getElementById('feishuWebhook').value;
            if (!webhook || !webhook.includes('feishu')) {
                alert('请输入正确的飞书Webhook地址');
                return;
            }
            
            try {
                const res = await fetch('/api/webhook', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ webhook })
                });
                
                if (!res.ok) {
                    throw new Error('服务器响应错误');
                }
                
                const data = await res.json();
                if (data.success) {
                    alert('✅ 保存成功！');
                    log('飞书Webhook已更新: ' + webhook.substring(0, 30) + '...');
                } else {
                    throw new Error(data.error || '保存失败');
                }
            } catch (e) {
                alert('❌ 保存失败: ' + e.message);
                log('Webhook保存失败: ' + e.message);
                console.error(e);
            }
        }
        
        // 更新状态
        function updateStatus(text) {
            document.getElementById('statusText').textContent = text;
            document.getElementById('statusTime').textContent = new Date().toLocaleTimeString();
        }
        
        // 添加日志
        function log(message) {
            const logContainer = document.getElementById('log');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logContainer.appendChild(entry);
            logContainer.scrollTop = logContainer.scrollHeight;
        }
        
        // 初始化
        loadConfig();
        
        // 立即获取一次实时数据
        setTimeout(() => {
            fetchQuotes();
        }, 1000);
        
        // 定时获取实时数据（每30秒）
        setInterval(() => {
            fetchQuotes();
        }, 30000);
        
        // 获取实时行情函数
        async function fetchQuotes() {
            if (stocks.length === 0) return;
            
            log('正在获取实时行情...');
            
            try {
                const codes = stocks.map(s => s.code).join(',');
                const res = await fetch(`/api/quotes?codes=${codes}`);
                
                if (!res.ok) {
                    throw new Error('获取行情失败: ' + res.status);
                }
                
                const data = await res.json();
                
                if (data.quotes && data.quotes.length > 0) {
                    data.quotes.forEach(quote => {
                        stockQuotes[quote.code] = quote;
                    });
                    renderStockList();
                    log(`行情更新完成，${data.quotes.length}只股票`);
                } else {
                    log('暂无行情数据');
                }
            } catch (e) {
                log('获取行情失败: ' + e.message);
                console.error(e);
            }
        }
        
        // 每分钟更新一次日志
        setInterval(() => {
            if (stocks.length > 0) {
                log('正在监控 ' + stocks.length + ' 只股票...');
            }
        }, 60000);
    </script>
</body>
</html>
