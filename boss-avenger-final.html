<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOSS清算者 - 抢怪仇人惩罚系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 15px;
        }
        
        .screen {
            display: none;
            animation: fadeIn 0.3s ease;
        }
        
        .screen.active {
            display: block;
        }
        
        /* 开始界面 - 第一版风格 */
        .start-screen {
            text-align: center;
            padding: 50px 20px;
        }
        
        .start-screen h1 {
            font-size: 3rem;
            background: linear-gradient(135deg, #e74c3c, #f39c12);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            text-shadow: 0 0 30px rgba(231, 76, 60, 0.5);
        }
        
        .start-screen .subtitle {
            color: #666;
            font-size: 1.1rem;
            margin-bottom: 40px;
        }
        
        .input-group {
            background: linear-gradient(135deg, #1a1a1a, #0d0d0d);
            border: 2px solid #333;
            border-radius: 15px;
            padding: 30px;
            max-width: 500px;
            margin: 0 auto 30px;
        }
        
        .input-group label {
            display: block;
            color: #e74c3c;
            font-size: 1.1rem;
            margin-bottom: 15px;
            font-weight: bold;
        }
        
        .input-group input {
            width: 100%;
            padding: 15px 20px;
            background: rgba(0,0,0,0.5);
            border: 2px solid #444;
            border-radius: 10px;
            color: #fff;
            font-size: 1.2rem;
            text-align: center;
            transition: all 0.3s;
        }
        
        .input-group input:focus {
            outline: none;
            border-color: #e74c3c;
            box-shadow: 0 0 20px rgba(231, 76, 60, 0.3);
        }
        
        .input-group input::placeholder {
            color: #555;
        }
        
        .crime-list {
            text-align: left;
            margin-top: 20px;
        }
        
        .crime-list h3 {
            color: #e74c3c;
            margin-bottom: 15px;
            font-size: 1rem;
        }
        
        .crime-item {
            padding: 10px 15px;
            margin: 8px 0;
            background: rgba(231, 76, 60, 0.1);
            border-left: 3px solid #e74c3c;
            border-radius: 5px;
            font-size: 0.95rem;
            color: #ccc;
        }
        
        .btn {
            padding: 18px 50px;
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            border: none;
            border-radius: 30px;
            color: #fff;
            font-size: 1.3rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 5px 20px rgba(231, 76, 60, 0.4);
        }
        
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(231, 76, 60, 0.6);
        }
        
        .btn:active {
            transform: scale(0.96);
        }
        
        /* 战斗界面 - 第一版风格+改进 */
        .game-box {
            background: linear-gradient(180deg, #1a1a1a 0%, #0d0d0d 100%);
            border: 2px solid #333;
            border-radius: 10px;
            padding: 20px;
            min-height: 500px;
            position: relative;
        }
        
        /* 侧边悬浮按钮 */
        .side-controls {
            position: fixed;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 100;
        }
        
        .side-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(0,0,0,0.7);
            border: 2px solid rgba(255,255,255,0.2);
            color: #fff;
            font-size: 1.4rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            backdrop-filter: blur(10px);
        }
        
        .side-btn:hover, .side-btn:active {
            transform: scale(1.1);
        }
        
        .side-btn.active {
            background: #e74c3c;
            border-color: #e74c3c;
            box-shadow: 0 0 20px rgba(231, 76, 60, 0.6);
        }
        
        /* 敌人区域 */
        .enemy-zone {
            text-align: center;
            padding: 20px;
            position: relative;
            margin-bottom: 20px;
        }
        
        .boss-icon {
            font-size: 8rem;
            display: inline-block;
            filter: drop-shadow(0 0 30px rgba(231, 76, 60, 0.6));
            transition: all 0.1s;
            cursor: pointer;
        }
        
        .boss-icon.hit {
            animation: bossHit 0.3s ease;
        }
        
        @keyframes bossHit {
            0% { transform: scale(1) rotate(0deg); filter: brightness(1); }
            25% { transform: scale(0.85) rotate(-15deg) translateX(-20px); filter: brightness(2) sepia(1) hue-rotate(-50deg) saturate(5); }
            50% { transform: scale(1.1) rotate(15deg) translateX(20px); filter: brightness(1.5); }
            75% { transform: scale(0.95) rotate(-5deg); filter: brightness(1.2); }
            100% { transform: scale(1) rotate(0deg); filter: brightness(1); }
        }
        
        .enemy-name {
            font-size: 1.8rem;
            color: #e74c3c;
            font-weight: bold;
            margin-top: 15px;
        }
        
        .enemy-title {
            color: #666;
            font-size: 0.9rem;
            margin-top: 5px;
        }
        
        /* 敌人血条 */
        .hp-container {
            max-width: 400px;
            margin: 20px auto;
        }
        
        .hp-text {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: #e74c3c;
        }
        
        .hp-bar {
            height: 25px;
            background: #1a1a1a;
            border: 2px solid #333;
            border-radius: 12px;
            overflow: hidden;
        }
        
        .hp-fill {
            height: 100%;
            background: linear-gradient(90deg, #e74c3c, #c0392b);
            border-radius: 10px;
            transition: width 0.2s ease;
        }
        
        /* 玩家区域 - 放在下方 */
        .player-zone {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            padding: 15px;
            margin-bottom: 20px;
            background: rgba(52, 152, 219, 0.05);
            border-radius: 15px;
            border: 1px solid rgba(52, 152, 219, 0.2);
        }
        
        .player-avatar {
            font-size: 3.5rem;
            filter: drop-shadow(0 0 15px rgba(52, 152, 219, 0.5));
        }
        
        .player-avatar.hit {
            animation: playerHit 0.3s ease;
        }
        
        @keyframes playerHit {
            0% { transform: scale(1); }
            50% { transform: scale(0.9) rotate(10deg); filter: brightness(1.5); }
            100% { transform: scale(1) rotate(0); }
        }
        
        .player-info {
            flex: 1;
            max-width: 250px;
        }
        
        .player-name {
            color: #3498db;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .player-hp-text {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: #3498db;
            margin-bottom: 5px;
        }
        
        .player-hp-bar {
            height: 20px;
            background: #1a1a1a;
            border: 2px solid #333;
            border-radius: 10px;
            overflow: hidden;
        }
        
        .player-hp-fill {
            height: 100%;
            background: linear-gradient(90deg, #3498db, #2980b9);
            border-radius: 8px;
            transition: width 0.2s ease;
        }
        
        /* 连击显示 */
        .combo-box {
            position: fixed;
            top: 100px;
            left: 20px;
            text-align: left;
        }
        
        .combo-num {
            font-size: 3rem;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.6);
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.2s;
        }
        
        .combo-num.show {
            opacity: 1;
            transform: scale(1);
        }
        
        .combo-label {
            font-size: 1rem;
            color: #f39c12;
            opacity: 0;
            transition: opacity 0.2s;
        }
        
        .combo-label.show {
            opacity: 1;
        }
        
        /* 攻击按钮 */
        .attack-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            max-width: 500px;
            margin: 0 auto;
        }
        
        .attack-btn {
            padding: 18px 15px;
            background: linear-gradient(135deg, rgba(231, 76, 60, 0.15), rgba(192, 57, 43, 0.15));
            border: 2px solid rgba(231, 76, 60, 0.4);
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.1s;
            position: relative;
        }
        
        .attack-btn:hover {
            background: linear-gradient(135deg, rgba(231, 76, 60, 0.35), rgba(192, 57, 43, 0.35));
            transform: translateY(-2px);
            border-color: #e74c3c;
        }
        
        .attack-btn:active {
            transform: scale(0.97);
        }
        
        .attack-btn .dmg-tag {
            position: absolute;
            top: 5px;
            right: 8px;
            background: #e74c3c;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.8rem;
            font-weight: bold;
        }
        
        .attack-btn.ult {
            background: linear-gradient(135deg, rgba(155, 89, 182, 0.2), rgba(142, 68, 173, 0.2));
            border-color: #9b59b6;
            grid-column: span 2;
            font-weight: bold;
        }
        
        .attack-btn.ult:hover {
            background: linear-gradient(135deg, rgba(155, 89, 182, 0.4), rgba(142, 68, 173, 0.4));
            border-color: #9b59b6;
        }
        
        /* 特效 */
        .damage-float {
            position: absolute;
            font-weight: bold;
            pointer-events: none;
            z-index: 100;
            animation: damageFloat 0.8s ease forwards;
        }
        
        .damage-enemy {
            font-size: 2.5rem;
            color: #e74c3c;
            text-shadow: 0 0 15px #e74c3c;
        }
        
        .damage-player {
            font-size: 1.8rem;
            color: #3498db;
            text-shadow: 0 0 10px #3498db;
        }
        
        .damage-crit {
            font-size: 3.5rem;
            color: #ffd700;
            text-shadow: 0 0 20px #ff6600, 0 0 40px #ff0000;
        }
        
        @keyframes damageFloat {
            0% { transform: translateY(0) scale(0.8); opacity: 1; }
            100% { transform: translateY(-100px) scale(1); opacity: 0; }
        }
        
        .taunt-bubble {
            position: fixed;
            top: 40%;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #f39c12, #e67e22);
            padding: 15px 30px;
            border-radius: 20px;
            font-size: 1.5rem;
            font-weight: bold;
            z-index: 200;
            animation: tauntPop 0.4s ease;
            box-shadow: 0 5px 30px rgba(243, 156, 18, 0.5);
        }
        
        @keyframes tauntPop {
            0% { transform: translateX(-50%) scale(0); }
            50% { transform: translateX(-50%) scale(1.1); }
            100% { transform: translateX(-50%) scale(1); }
        }
        
        .screen-flash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(231, 76, 60, 0.3);
            opacity: 0;
            pointer-events: none;
            z-index: 50;
            transition: opacity 0.1s;
        }
        
        .screen-flash.show {
            opacity: 1;
        }
        
        .shake {
            animation: screenShake 0.4s ease;
        }
        
        @keyframes screenShake {
            0%, 100% { transform: translate(0, 0); }
            20% { transform: translate(-12px, 6px); }
            40% { transform: translate(12px, -6px); }
            60% { transform: translate(-12px, -6px); }
            80% { transform: translate(12px, 6px); }
        }
        
        /* 弹窗 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.85);
            z-index: 500;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .modal-overlay.show {
            display: flex;
        }
        
        .modal {
            background: #1a1a1a;
            border: 2px solid #333;
            border-radius: 15px;
            padding: 25px;
            max-width: 450px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
        }
        
        .modal h3 {
            color: #e74c3c;
            margin-bottom: 20px;
            text-align: center;
            font-size: 1.4rem;
        }
        
        .skill-edit {
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 12px;
        }
        
        .skill-edit h4 {
            color: #e74c3c;
            font-size: 0.9rem;
            margin-bottom: 10px;
        }
        
        .skill-edit input {
            width: 100%;
            padding: 10px;
            margin-bottom: 8px;
            background: rgba(0,0,0,0.4);
            border: 1px solid #444;
            border-radius: 8px;
            color: #fff;
            font-size: 0.95rem;
        }
        
        .modal-close {
            width: 100%;
            padding: 15px;
            margin-top: 10px;
            background: #e74c3c;
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 1.1rem;
            cursor: pointer;
        }
        
        /* 结束界面 */
        .end-screen {
            text-align: center;
            padding: 50px 20px;
        }
        
        .end-title {
            font-size: 3rem;
            color: #e74c3c;
            margin-bottom: 30px;
            text-shadow: 0 0 30px rgba(231, 76, 60, 0.5);
        }
        
        .end-emoji {
            font-size: 8rem;
            margin: 30px 0;
            filter: grayscale(1);
            animation: deadShake 1s ease infinite;
        }
        
        @keyframes deadShake {
            0%, 100% { transform: rotate(-3deg); }
            50% { transform: rotate(3deg); }
        }
        
        .end-text {
            font-size: 1.2rem;
            color: #ccc;
            line-height: 2;
            margin-bottom: 30px;
        }
        
        @media (max-width: 600px) {
            .start-screen h1 { font-size: 2.2rem; }
            .boss-icon { font-size: 6rem; }
            .enemy-name { font-size: 1.4rem; }
            .player-zone { flex-direction: column; gap: 10px; }
            .player-avatar { font-size: 2.5rem; }
            .attack-grid { grid-template-columns: 1fr; }
            .attack-btn.ult { grid-column: span 1; }
            .side-controls { right: 10px; }
            .side-btn { width: 42px; height: 42px; font-size: 1.2rem; }
        }
    </style>
</head>
<body>
    <div class="screen-flash" id="screenFlash"></div>
    
    <div class="container">
        <!-- 开始界面 -->
        <div class="screen active" id="startScreen">
            <div class="start-screen">
                <h1>BOSS清算者</h1>
                <p class="subtitle">抢怪仇人惩罚系统</p>
                
                <div class="input-group">
                    <label>📝 输入抢你BOSS的仇人名字</label>
                    <input type="text" id="enemyNameInput" placeholder="例如：霸服狂魔丶龙傲天" maxlength="15">
                    
                    <div class="crime-list">
                        <h3>📋 罪行清单（系统将自动清算）</h3>
                        <div class="crime-item">⚔️ 恶意抢夺世界BOSS归属权</div>
                        <div class="crime-item">😈 击杀后私信嘲讽羞辱</div>
                        <div class="crime-item">🚫 带人封锁BOSS刷新点</div>
                        <div class="crime-item">💬 世界频道散播谣言抹黑</div>
                    </div>
                </div>
                
                <button class="btn" onclick="startBattle()">开始清算</button>
            </div>
        </div>
        
        <!-- 战斗界面 -->
        <div class="screen" id="battleScreen">
            <!-- 侧边控制按钮 -->
            <div class="side-controls">
                <button class="side-btn" id="btnInfinite" onclick="toggleInfinite()" title="无限血条">♾️</button>
                <button class="side-btn" id="btnGod" onclick="toggleGod()" title="无敌模式">🛡️</button>
                <button class="side-btn" onclick="openSkillModal()" title="技能设置">⚙️</button>
            </div>
            
            <!-- 连击显示 -->
            <div class="combo-box">
                <div class="combo-num" id="comboNum">0</div>
                <div class="combo-label" id="comboLabel">连击</div>
            </div>
            
            <div class="game-box">
                <!-- 敌人 -->
                <div class="enemy-zone">
                    <div class="boss-icon" id="bossIcon">😈</div>
                    <div class="enemy-name" id="enemyNameDisplay">抢怪狗</div>
                    <div class="enemy-title">Lv.99 抢怪惯犯 · 全服公敌</div>
                    
                    <div class="hp-container">
                        <div class="hp-text">
                            <span>嚣张值</span>
                            <span id="enemyHPText">100/100</span>
                        </div>
                        <div class="hp-bar">
                            <div class="hp-fill" id="enemyHPBar" style="width: 100%"></div>
                        </div>
                    </div>
                </div>
                
                <!-- 玩家 -->
                <div class="player-zone">
                    <div class="player-avatar" id="playerAvatar">😎</div>
                    <div class="player-info">
                        <div class="player-name">你</div>
                        <div class="player-hp-text">
                            <span>你的血量</span>
                            <span id="playerHPText">100/100</span>
                        </div>
                        <div class="player-hp-bar">
                            <div class="player-hp-fill" id="playerHPBar" style="width: 100%"></div>
                        </div>
                    </div>
                </div>
                
                <!-- 攻击按钮 -->
                <div class="attack-grid" id="attackGrid"></div>
            </div>
        </div>
        
        <!-- 结束界面 -->
        <div class="screen" id="endScreen">
            <div class="end-screen">
                <div class="end-title">清算完成</div>
                <div class="end-emoji">🤡</div>
                <div class="end-text" id="endMessage"></div>
                <button class="btn" onclick="restart()">再来一局</button>
            </div>
        </div>
    </div>
    
    <!-- 技能弹窗 -->
    <div class="modal-overlay" id="skillModal">
        <div class="modal">
            <h3>⚙️ 自定义技能</h3>
            <div id="skillEditor"></div>
            <button class="modal-close" onclick="saveSkills()">保存</button>
        </div>
    </div>
    
    <script>
        // 默认技能
        let skills = [
            { name: '王八拳', damage: 15, icon: '👊' },
            { name: '夺命飞踢', damage: 22, icon: '🦶' },
            { name: '世界曝光', damage: 30, icon: '📢' },
            { name: '终极审判', damage: 50, icon: '⚡', ult: true }
        ];
        
        // 状态
        let enemyName = '';
        let enemyHP = 100;
        let enemyMaxHP = 100;
        let playerHP = 100;
        let playerMaxHP = 100;
        let combo = 0;
        let infiniteMode = false;
        let godMode = false;
        let gameOver = false;
        let lastAttackTime = 0;
        
        const taunts = ['就这？','你在给我挠痒痒吗？','太弱了！','BOSS是我的！','根本不疼！','没吃饭吗？'];
        const counterLines = ['吃我一招！','没那么容易！','看招！','反击！'];
        
        function startBattle() {
            enemyName = document.getElementById('enemyNameInput').value.trim() || '抢怪狗';
            document.getElementById('enemyNameDisplay').textContent = enemyName;
            
            enemyHP = 100;
            playerHP = 100;
            combo = 0;
            gameOver = false;
            infiniteMode = false;
            godMode = false;
            
            document.getElementById('btnInfinite').classList.remove('active');
            document.getElementById('btnGod').classList.remove('active');
            
            updateDisplay();
            renderButtons();
            
            document.getElementById('startScreen').classList.remove('active');
            document.getElementById('battleScreen').classList.add('active');
        }
        
        function renderButtons() {
            const grid = document.getElementById('attackGrid');
            grid.innerHTML = '';
            
            skills.forEach((skill, i) => {
                const btn = document.createElement('button');
                btn.className = skill.ult ? 'attack-btn ult' : 'attack-btn';
                btn.innerHTML = skill.ult ? 
                    `${skill.icon} ${skill.name}` :
                    `${skill.icon} ${skill.name}<span class="dmg-tag">-${skill.damage}</span>`;
                btn.onclick = () => doAttack(i);
                grid.appendChild(btn);
            });
        }
        
        function doAttack(idx) {
            if (gameOver) return;
            
            const skill = skills[idx];
            const now = Date.now();
            let damage = skill.damage;
            
            // 连击
            if (now - lastAttackTime < 1500) {
                combo++;
                damage = Math.floor(damage * (1 + combo * 0.1));
                showCombo();
            } else {
                combo = 1;
            }
            lastAttackTime = now;
            
            // 暴击 25%
            const crit = Math.random() < 0.25;
            if (crit) damage = Math.floor(damage * 1.8);
            
            // 无限模式
            if (infiniteMode) enemyHP = 100;
            else enemyHP = Math.max(0, enemyHP - damage);
            
            // 特效
            showDamage(damage, 'enemy', crit);
            document.getElementById('screenFlash').classList.add('show');
            setTimeout(() => document.getElementById('screenFlash').classList.remove('show'), 100);
            document.body.classList.add('shake');
            setTimeout(() => document.body.classList.remove('shake'), 400);
            document.getElementById('bossIcon').classList.add('hit');
            setTimeout(() => document.getElementById('bossIcon').classList.remove('hit'), 300);
            
            updateDisplay();
            
            // 嘲讽
            if (Math.random() < 0.4) showTaunt(taunts[Math.floor(Math.random() * taunts.length)]);
            
            // 结束检查
            if (!infiniteMode && enemyHP <= 0) {
                setTimeout(endGame, 500);
                return;
            }
            
            // 敌人反击
            if (Math.random() < 0.35) {
                setTimeout(enemyCounter, 400);
            }
            
            // 重置连击
            clearTimeout(window.comboTimer);
            window.comboTimer = setTimeout(() => { combo = 0; hideCombo(); }, 2000);
        }
        
        function enemyCounter() {
            if (gameOver) return;
            
            let dmg = Math.floor(Math.random() * 6) + 3;
            
            if (godMode) {
                dmg = 0;
                showTaunt('🛡️ 无敌！');
            }
            
            playerHP = Math.max(0, playerHP - dmg);
            showDamage(dmg, 'player', false);
            document.getElementById('playerAvatar').classList.add('hit');
            setTimeout(() => document.getElementById('playerAvatar').classList.remove('hit'), 300);
            updateDisplay();
            
            if (playerHP <= 0 && !godMode) {
                setTimeout(() => endGame(false), 500);
            }
        }
        
        function showCombo() {
            document.getElementById('comboNum').textContent = combo;
            document.getElementById('comboNum').classList.add('show');
            document.getElementById('comboLabel').classList.add('show');
        }
        
        function hideCombo() {
            document.getElementById('comboNum').classList.remove('show');
            document.getElementById('comboLabel').classList.remove('show');
        }
        
        function showDamage(dmg, target, crit) {
            const el = document.createElement('div');
            el.className = `damage-float damage-${target} ${crit ? 'damage-crit' : ''}`;
            el.textContent = crit ? `暴击! ${dmg}` : `-${dmg}`;
            
            const container = target === 'enemy' ? 
                document.querySelector('.enemy-zone') : 
                document.querySelector('.player-zone');
            
            const rect = container.getBoundingClientRect();
            el.style.left = (rect.width/2 - 40 + Math.random()*80) + 'px';
            el.style.top = target === 'enemy' ? '80px' : '20px';
            
            container.appendChild(el);
            setTimeout(() => el.remove(), 800);
        }
        
        function showTaunt(text) {
            const el = document.createElement('div');
            el.className = 'taunt-bubble';
            el.textContent = text;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 1200);
        }
        
        function updateDisplay() {
            document.getElementById('enemyHPBar').style.width = (enemyHP/100*100) + '%';
            document.getElementById('enemyHPText').textContent = `${enemyHP}/100`;
            document.getElementById('playerHPBar').style.width = (playerHP/100*100) + '%';
            document.getElementById('playerHPText').textContent = `${playerHP}/100`;
            
            // 表情
            const hp = enemyHP / 100;
            const boss = document.getElementById('bossIcon');
            if (hp > 0.7) boss.textContent = '😈';
            else if (hp > 0.4) boss.textContent = '😤';
            else if (hp > 0) boss.textContent = '😰';
            else boss.textContent = '🤡';
        }
        
        function toggleInfinite() {
            infiniteMode = !infiniteMode;
            document.getElementById('btnInfinite').classList.toggle('active', infiniteMode);
            showTaunt(infiniteMode ? '♾️ 无限血条开启' : '♾️ 无限血条关闭');
        }
        
        function toggleGod() {
            godMode = !godMode;
            document.getElementById('btnGod').classList.toggle('active', godMode);
            showTaunt(godMode ? '🛡️ 无敌模式开启' : '🛡️ 无敌模式关闭');
        }
        
        function openSkillModal() {
            const editor = document.getElementById('skillEditor');
            editor.innerHTML = '';
            skills.forEach((s, i) => {
                editor.innerHTML += `
                    <div class="skill-edit">
                        <h4>技能${i+1}${s.ult ? ' (必杀)' : ''}</h4>
                        <input type="text" id="sk${i}name" value="${s.name}" placeholder="名称">
                        <input type="number" id="sk${i}dmg" value="${s.damage}" placeholder="伤害">
                        <input type="text" id="sk${i}icon" value="${s.icon}" placeholder="图标">
                    </div>
                `;
            });
            document.getElementById('skillModal').classList.add('show');
        }
        
        function saveSkills() {
            skills.forEach((s, i) => {
                s.name = document.getElementById(`sk${i}name`).value || s.name;
                s.damage = parseInt(document.getElementById(`sk${i}dmg`).value) || s.damage;
                s.icon = document.getElementById(`sk${i}icon`).value || s.icon;
            });
            renderButtons();
            document.getElementById('skillModal').classList.remove('show');
            showTaunt('⚙️ 技能已更新');
        }
        
        function endGame(win = true) {
            gameOver = true;
            document.getElementById('battleScreen').classList.remove('active');
            document.getElementById('endScreen').classList.add('active');
            
            const msgs = win ? [
                `${enemyName} 已经被你打到删号退游！`,
                `经过你的"教育"，${enemyName} 再也不敢抢BOSS了！`,
                `${enemyName} 正在世界频道疯狂道歉！`
            ] : [
                `没想到 ${enemyName} 这么顽强...`,
                `虽然你倒下了，但精神永不灭！`
            ];
            document.getElementById('endMessage').textContent = msgs[Math.floor(Math.random() * msgs.length)];
        }
        
        function restart() {
            enemyHP = 100;
            playerHP = 100;
            combo = 0;
            gameOver = false;
            infiniteMode = false;
            godMode = false;
            document.getElementById('btnInfinite').classList.remove('active');
            document.getElementById('btnGod').classList.remove('active');
            document.getElementById('endScreen').classList.remove('active');
            document.getElementById('startScreen').classList.add('active');
        }
        
        // 回车开始
        document.getElementById('enemyNameInput').addEventListener('keypress', e => {
            if (e.key === 'Enter') startBattle();
        });
    </script>
</body>
</html>
