<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOSS清算者MAX - 爽快对战版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 15px;
        }
        
        .screen {
            display: none;
        }
        
        .screen.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }
        
        /* 开始界面 - 简洁 */
        .start-screen {
            text-align: center;
            padding: 80px 20px;
        }
        
        .start-screen h1 {
            font-size: 3.5rem;
            color: #e74c3c;
            text-shadow: 0 0 30px rgba(231, 76, 60, 0.6);
            margin-bottom: 10px;
            animation: titlePulse 2s infinite;
        }
        
        @keyframes titlePulse {
            0%, 100% { text-shadow: 0 0 30px rgba(231, 76, 60, 0.6); }
            50% { text-shadow: 0 0 50px rgba(231, 76, 60, 0.9); }
        }
        
        .subtitle {
            color: #666;
            font-size: 1.1rem;
            margin-bottom: 50px;
        }
        
        .name-input {
            max-width: 400px;
            margin: 0 auto 30px;
        }
        
        .name-input input {
            width: 100%;
            padding: 18px 25px;
            background: rgba(231, 76, 60, 0.1);
            border: 2px solid rgba(231, 76, 60, 0.4);
            border-radius: 30px;
            color: #fff;
            font-size: 1.2rem;
            text-align: center;
            transition: all 0.3s;
        }
        
        .name-input input:focus {
            outline: none;
            border-color: #e74c3c;
            box-shadow: 0 0 30px rgba(231, 76, 60, 0.3);
        }
        
        .name-input input::placeholder {
            color: #555;
        }
        
        .btn {
            padding: 18px 50px;
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            border: none;
            border-radius: 30px;
            color: #fff;
            font-size: 1.3rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 5px 20px rgba(231, 76, 60, 0.4);
        }
        
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(231, 76, 60, 0.6);
        }
        
        /* 战斗界面 */
        .battle-screen {
            position: relative;
        }
        
        /* 侧边控制面板 */
        .side-panel {
            position: fixed;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid #333;
            border-radius: 10px;
            padding: 15px 10px;
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .side-btn {
            width: 45px;
            height: 45px;
            background: rgba(231, 76, 60, 0.2);
            border: 2px solid rgba(231, 76, 60, 0.4);
            border-radius: 10px;
            color: #fff;
            font-size: 1.3rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .side-btn:hover {
            background: rgba(231, 76, 60, 0.4);
            transform: scale(1.1);
        }
        
        .side-btn.active {
            background: #e74c3c;
            border-color: #e74c3c;
            box-shadow: 0 0 15px rgba(231, 76, 60, 0.6);
        }
        
        .side-btn span {
            font-size: 0.6rem;
            position: absolute;
            bottom: -15px;
            white-space: nowrap;
            color: #888;
        }
        
        /* 敌人区域 */
        .enemy-zone {
            text-align: center;
            padding: 30px 20px 20px;
            position: relative;
        }
        
        .boss-icon {
            font-size: 9rem;
            display: inline-block;
            filter: drop-shadow(0 0 30px rgba(231, 76, 60, 0.6));
            transition: all 0.1s;
            cursor: pointer;
        }
        
        .boss-icon.hit {
            animation: bossHit 0.25s ease;
        }
        
        @keyframes bossHit {
            0% { transform: scale(1) rotate(0); filter: brightness(1); }
            25% { transform: scale(0.8) rotate(-15deg) translateX(-30px); filter: brightness(3) sepia(1) hue-rotate(-50deg) saturate(5); }
            50% { transform: scale(1.15) rotate(15deg) translateX(30px); filter: brightness(2); }
            75% { transform: scale(0.9) rotate(-5deg); filter: brightness(1.3); }
            100% { transform: scale(1) rotate(0); filter: brightness(1); }
        }
        
        .boss-icon.crit {
            animation: bossCrit 0.4s ease;
        }
        
        @keyframes bossCrit {
            0% { transform: scale(1); }
            20% { transform: scale(0.6) rotate(-30deg); }
            40% { transform: scale(1.4) rotate(20deg); }
            60% { transform: scale(0.7) rotate(-15deg); }
            80% { transform: scale(1.2) rotate(10deg); }
            100% { transform: scale(1) rotate(0); }
        }
        
        .enemy-name-display {
            font-size: 2rem;
            color: #e74c3c;
            font-weight: bold;
            margin-top: 15px;
            text-shadow: 0 0 20px rgba(231, 76, 60, 0.5);
        }
        
        .enemy-title {
            color: #666;
            font-size: 0.95rem;
            margin-top: 5px;
        }
        
        /* 敌人血条 */
        .enemy-hp {
            max-width: 450px;
            margin: 20px auto;
        }
        
        .hp-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: #e74c3c;
        }
        
        .hp-bar-container {
            height: 28px;
            background: #1a1a1a;
            border: 2px solid #333;
            border-radius: 14px;
            overflow: hidden;
        }
        
        .hp-bar {
            height: 100%;
            background: linear-gradient(90deg, #e74c3c, #c0392b);
            border-radius: 12px;
            transition: width 0.15s ease;
            position: relative;
        }
        
        .hp-bar::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 40%;
            background: linear-gradient(180deg, rgba(255,255,255,0.3), transparent);
        }
        
        /* 自身血条区域 */
        .player-zone {
            position: fixed;
            bottom: 150px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            width: 200px;
        }
        
        .player-hp {
            margin-bottom: 10px;
        }
        
        .player-hp .hp-label {
            color: #3498db;
            font-size: 0.85rem;
        }
        
        .player-hp .hp-bar {
            background: linear-gradient(90deg, #3498db, #2980b9);
        }
        
        .player-avatar {
            font-size: 3rem;
            display: inline-block;
            filter: drop-shadow(0 0 10px rgba(52, 152, 219, 0.5));
        }
        
        .player-avatar.hit {
            animation: playerHit 0.3s ease;
        }
        
        @keyframes playerHit {
            0% { transform: scale(1); }
            50% { transform: scale(0.9) rotate(10deg); filter: brightness(2) hue-rotate(180deg); }
            100% { transform: scale(1) rotate(0); }
        }
        
        /* 伤害数字 */
        .damage-float {
            position: absolute;
            font-weight: bold;
            pointer-events: none;
            z-index: 100;
            animation: damageUp 0.8s ease forwards;
        }
        
        .damage-enemy {
            font-size: 3rem;
            color: #e74c3c;
            text-shadow: 0 0 20px #e74c3c, 0 0 40px #e74c3c;
        }
        
        .damage-player {
            font-size: 2rem;
            color: #3498db;
            text-shadow: 0 0 10px #3498db;
        }
        
        .damage-crit {
            font-size: 4rem;
            color: #ffd700;
            text-shadow: 0 0 20px #ff6600, 0 0 40px #ff0000;
        }
        
        @keyframes damageUp {
            0% { transform: translateY(0) scale(0.5); opacity: 0; }
            20% { transform: translateY(-40px) scale(1.3); opacity: 1; }
            100% { transform: translateY(-120px) scale(1); opacity: 0; }
        }
        
        /* 连击显示 */
        .combo-display {
            position: fixed;
            top: 100px;
            right: 80px;
            text-align: right;
        }
        
        .combo-count {
            font-size: 4rem;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.8);
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.2s;
        }
        
        .combo-count.show {
            opacity: 1;
            transform: scale(1);
            animation: comboBounce 0.3s ease;
        }
        
        @keyframes comboBounce {
            0% { transform: scale(0.5); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }
        
        /* 嘲讽 */
        .taunt-bubble {
            position: fixed;
            top: 30%;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, rgba(243, 156, 18, 0.95), rgba(230, 126, 34, 0.95));
            padding: 20px 40px;
            border-radius: 20px;
            font-size: 1.8rem;
            font-weight: bold;
            z-index: 200;
            animation: tauntPop 0.4s ease;
            box-shadow: 0 0 40px rgba(243, 156, 18, 0.6);
        }
        
        @keyframes tauntPop {
            0% { transform: translateX(-50%) scale(0); }
            50% { transform: translateX(-50%) scale(1.2); }
            100% { transform: translateX(-50%) scale(1); }
        }
        
        /* 攻击区 */
        .attack-zone {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 600px;
        }
        
        .attack-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        
        .attack-btn {
            padding: 18px 15px;
            background: linear-gradient(135deg, rgba(231, 76, 60, 0.15), rgba(192, 57, 43, 0.15));
            border: 2px solid rgba(231, 76, 60, 0.5);
            border-radius: 12px;
            color: #fff;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.1s;
            position: relative;
            overflow: hidden;
        }
        
        .attack-btn:hover {
            background: linear-gradient(135deg, rgba(231, 76, 60, 0.4), rgba(192, 57, 43, 0.4));
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(231, 76, 60, 0.4);
        }
        
        .attack-btn:active {
            transform: translateY(0) scale(0.97);
        }
        
        .attack-btn .dmg {
            position: absolute;
            top: 5px;
            right: 8px;
            background: #e74c3c;
            padding: 2px 10px;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: bold;
        }
        
        .attack-btn.ult {
            background: linear-gradient(135deg, rgba(155, 89, 182, 0.3), rgba(142, 68, 173, 0.3));
            border-color: #9b59b6;
            grid-column: span 2;
            padding: 22px;
        }
        
        .attack-btn.ult:hover {
            box-shadow: 0 8px 25px rgba(155, 89, 182, 0.5);
        }
        
        /* 弹窗 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            z-index: 500;
            align-items: center;
            justify-content: center;
        }
        
        .modal-overlay.active {
            display: flex;
        }
        
        .modal {
            background: linear-gradient(135deg, #1a1a1a, #0d0d0d);
            border: 2px solid #333;
            border-radius: 15px;
            padding: 25px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }
        
        .modal h3 {
            color: #e74c3c;
            margin-bottom: 20px;
            font-size: 1.5rem;
            text-align: center;
        }
        
        .skill-edit-row {
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
        }
        
        .skill-edit-row h4 {
            color: #e74c3c;
            margin-bottom: 10px;
            font-size: 1rem;
        }
        
        .skill-edit-row input {
            width: 100%;
            padding: 10px;
            margin-bottom: 8px;
            background: rgba(0,0,0,0.5);
            border: 1px solid #444;
            border-radius: 5px;
            color: #fff;
        }
        
        .modal-close {
            display: block;
            width: 100%;
            padding: 15px;
            margin-top: 20px;
            background: #e74c3c;
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 1.1rem;
            cursor: pointer;
        }
        
        /* 特效层 */
        .screen-flash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(231, 76, 60, 0.4);
            opacity: 0;
            pointer-events: none;
            z-index: 50;
            transition: opacity 0.1s;
        }
        
        .screen-flash.active {
            opacity: 1;
        }
        
        .shake {
            animation: screenShake 0.4s ease;
        }
        
        @keyframes screenShake {
            0%, 100% { transform: translate(0, 0); }
            10% { transform: translate(-15px, -8px); }
            20% { transform: translate(15px, 8px); }
            30% { transform: translate(-15px, 8px); }
            40% { transform: translate(15px, -8px); }
            50% { transform: translate(-10px, 12px); }
            60% { transform: translate(10px, -12px); }
            70% { transform: translate(-5px, 5px); }
            80% { transform: translate(5px, -5px); }
            90% { transform: translate(-2px, 2px); }
        }
        
        /* 结束界面 */
        .end-screen {
            text-align: center;
            padding: 60px 20px;
        }
        
        .end-title {
            font-size: 3.5rem;
            color: #e74c3c;
            margin-bottom: 30px;
            text-shadow: 0 0 40px rgba(231, 76, 60, 0.6);
        }
        
        .end-boss {
            font-size: 8rem;
            margin: 30px 0;
            filter: grayscale(1);
            animation: deadShake 1s ease infinite;
        }
        
        @keyframes deadShake {
            0%, 100% { transform: rotate(-3deg); }
            50% { transform: rotate(3deg); }
        }
        
        @media (max-width: 600px) {
            .side-panel {
                right: 5px;
                padding: 10px 5px;
            }
            .side-btn {
                width: 40px;
                height: 40px;
                font-size: 1.1rem;
            }
            .boss-icon { font-size: 6rem; }
            .attack-grid { grid-template-columns: 1fr; }
            .attack-btn.ult { grid-column: span 1; }
            .combo-display { right: 60px; }
        }
    </style>
</head>
<body>
    <div class="screen-flash" id="screenFlash"></div>
    
    <div class="container">
        <!-- 开始界面 -->
        <div class="screen active" id="startScreen">
            <div class="start-screen">
                <h1>👊 BOSS清算者MAX</h1>
                <p class="subtitle">输入仇人名字，开始爽快清算</p>
                
                <div class="name-input">
                    <input type="text" id="enemyNameInput" placeholder="例如：霸服狂魔丶龙傲天" maxlength="15">
                </div>
                
                <button class="btn" onclick="startBattle()">开始清算</button>
            </div>
        </div>
        
        <!-- 战斗界面 -->
        <div class="screen" id="battleScreen">
            <!-- 侧边控制面板 -->
            <div class="side-panel">
                <button class="side-btn" id="btnInfinite" onclick="toggleInfinite()" title="无限血条">♾️</button>
                <button class="side-btn" id="btnGod" onclick="toggleGod()" title="无敌模式">🛡️</button>
                <button class="side-btn" id="btnSkills" onclick="openSkillModal()" title="技能设置">⚙️</button>
            </div>
            
            <!-- 连击显示 -->
            <div class="combo-display">
                <div class="combo-count" id="comboCount">0</div>
            </div>
            
            <!-- 敌人区域 -->
            <div class="enemy-zone">
                <div class="boss-icon" id="bossIcon">😈</div>
                <div class="enemy-name-display" id="enemyName">抢怪狗</div>
                <div class="enemy-title">Lv.99 抢怪惯犯 · 全服公敌</div>
                
                <div class="enemy-hp">
                    <div class="hp-label">
                        <span>嚣张值</span>
                        <span id="enemyHPText">100/100</span>
                    </div>
                    <div class="hp-bar-container">
                        <div class="hp-bar" id="enemyHPBar" style="width: 100%"></div>
                    </div>
                </div>
            </div>
            
            <!-- 玩家血条（下方） -->
            <div class="player-zone">
                <div class="player-hp">
                    <div class="hp-label">
                        <span>你的血量</span>
                        <span id="playerHPText">100/100</span>
                    </div>
                    <div class="hp-bar-container">
                        <div class="hp-bar" id="playerHPBar" style="width: 100%"></div>
                    </div>
                </div>
                <div class="player-avatar" id="playerAvatar">😎</div>
            </div>
            
            <!-- 攻击区 -->
            <div class="attack-zone">
                <div class="attack-grid" id="attackGrid"></div>
            </div>
        </div>
        
        <!-- 结束界面 -->
        <div class="screen" id="endScreen">
            <div class="end-screen">
                <div class="end-title">💀 清算完成</div>
                <div class="end-boss">🤡</div>
                <div id="endMessage"></div>
                <button class="btn" onclick="restart()">再来一局</button>
            </div>
        </div>
    </div>
    
    <!-- 技能设置弹窗 -->
    <div class="modal-overlay" id="skillModal">
        <div class="modal">
            <h3>⚙️ 自定义技能</h3>
            
            <div id="skillEditor"></div>
            
            <button class="modal-close" onclick="closeSkillModal()">保存并关闭</button>
        </div>
    </div>
    
    <script>
        // 默认技能
        let skills = [
            { name: '王八拳', damage: 15, icon: '👊', desc: '朴实无华的一拳' },
            { name: '夺命飞踢', damage: 22, icon: '🦶', desc: '一脚踹飞' },
            { name: '世界曝光', damage: 30, icon: '📢', desc: '全服社死' },
            { name: '终极审判', damage: 50, icon: '⚡', desc: '必杀技', ult: true }
        ];
        
        // 游戏状态
        let enemyName = '';
        let enemyHP = 100;
        let enemyMaxHP = 100;
        let playerHP = 100;
        let playerMaxHP = 100;
        let combo = 0;
        let infiniteMode = false;
        let godMode = false;
        let gameOver = false;
        let lastAttackTime = 0;
        let comboTimer = null;
        
        // 嘲讽语
        const taunts = [
            "就这？","你在给我挠痒痒吗？","不行啊弟弟！",
            "太弱了！","BOSS是我的！","笑死，根本不疼！"
        ];
        
        function startBattle() {
            enemyName = document.getElementById('enemyNameInput').value.trim() || '抢怪狗';
            document.getElementById('enemyName').textContent = enemyName;
            
            enemyHP = 100;
            playerHP = 100;
            combo = 0;
            gameOver = false;
            
            updateDisplay();
            generateButtons();
            
            document.getElementById('startScreen').classList.remove('active');
            document.getElementById('battleScreen').classList.add('active');
        }
        
        function generateButtons() {
            const grid = document.getElementById('attackGrid');
            grid.innerHTML = '';
            
            skills.forEach((skill, i) => {
                const btn = document.createElement('button');
                btn.className = skill.ult ? 'attack-btn ult' : 'attack-btn';
                btn.innerHTML = `
                    ${skill.icon} ${skill.name}
                    ${skill.ult ? '' : `<span class="dmg">-${skill.damage}</span>`}
                `;
                btn.onclick = () => attack(i);
                grid.appendChild(btn);
            });
        }
        
        function attack(skillIndex) {
            if (gameOver) return;
            
            const skill = skills[skillIndex];
            const now = Date.now();
            let damage = skill.damage;
            
            // 连击
            if (now - lastAttackTime < 1500) {
                combo++;
                damage = Math.floor(damage * (1 + combo * 0.12));
                showCombo();
            } else {
                combo = 1;
            }
            lastAttackTime = now;
            
            // 暴击
            const isCrit = Math.random() < 0.25;
            if (isCrit) damage = Math.floor(damage * 1.8);
            
            // 无限模式
            if (infiniteMode) {
                enemyHP = enemyMaxHP;
            } else {
                enemyHP = Math.max(0, enemyHP - damage);
            }
            
            // 特效
            showDamage(damage, 'enemy', isCrit);
            flashScreen();
            shakeScreen();
            animateBoss(isCrit);
            updateDisplay();
            
            // 嘲讽
            if (Math.random() < 0.4) {
                showTaunt(taunts[Math.floor(Math.random() * taunts.length)]);
            }
            
            // 检查结束
            if (!infiniteMode && enemyHP <= 0) {
                setTimeout(endGame, 500);
                return;
            }
            
            // 敌人反击
            if (Math.random() < 0.35) {
                setTimeout(enemyCounter, 400);
            }
            
            // 重置连击
            clearTimeout(comboTimer);
            comboTimer = setTimeout(() => { combo = 0; hideCombo(); }, 2000);
        }
        
        function enemyCounter() {
            if (gameOver) return;
            
            let damage = Math.floor(Math.random() * 6) + 3;
            
            if (godMode) {
                damage = 0;
                showTaunt("🛡️ 无敌！");
            }
            
            playerHP = Math.max(0, playerHP - damage);
            showDamage(damage, 'player', false);
            animatePlayer();
            updateDisplay();
            
            if (playerHP <= 0 && !godMode) {
                setTimeout(() => endGame(false), 500);
            }
        }
        
        function showDamage(dmg, target, crit) {
            const el = document.createElement('div');
            el.className = `damage-float damage-${target} ${crit ? 'damage-crit' : ''}`;
            el.textContent = crit ? `暴击! ${dmg}` : `-${dmg}`;
            
            const container = target === 'enemy' ? 
                document.querySelector('.enemy-zone') : 
                document.querySelector('.player-zone');
            
            const rect = container.getBoundingClientRect();
            el.style.left = (rect.width/2 - 40 + Math.random()*80) + 'px';
            el.style.top = target === 'enemy' ? '100px' : '-50px';
            
            container.appendChild(el);
            setTimeout(() => el.remove(), 800);
        }
        
        function showCombo() {
            const el = document.getElementById('comboCount');
            el.textContent = combo + '连击';
            el.classList.add('show');
        }
        
        function hideCombo() {
            document.getElementById('comboCount').classList.remove('show');
        }
        
        function showTaunt(text) {
            const el = document.createElement('div');
            el.className = 'taunt-bubble';
            el.textContent = text;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 1200);
        }
        
        function flashScreen() {
            const el = document.getElementById('screenFlash');
            el.classList.add('active');
            setTimeout(() => el.classList.remove('active'), 100);
        }
        
        function shakeScreen() {
            document.body.classList.add('shake');
            setTimeout(() => document.body.classList.remove('shake'), 400);
        }
        
        function animateBoss(crit) {
            const boss = document.getElementById('bossIcon');
            boss.classList.add(crit ? 'crit' : 'hit');
            setTimeout(() => boss.classList.remove(crit ? 'crit' : 'hit'), crit ? 400 : 250);
        }
        
        function animatePlayer() {
            const player = document.getElementById('playerAvatar');
            player.classList.add('hit');
            setTimeout(() => player.classList.remove('hit'), 300);
        }
        
        function updateDisplay() {
            document.getElementById('enemyHPBar').style.width = (enemyHP/enemyMaxHP*100) + '%';
            document.getElementById('enemyHPText').textContent = `${enemyHP}/${enemyMaxHP}`;
            document.getElementById('playerHPBar').style.width = (playerHP/playerMaxHP*100) + '%';
            document.getElementById('playerHPText').textContent = `${playerHP}/${playerMaxHP}`;
            
            // 表情
            const hp = enemyHP / enemyMaxHP;
            const boss = document.getElementById('bossIcon');
            if (hp > 0.7) boss.textContent = '😈';
            else if (hp > 0.4) boss.textContent = '😤';
            else if (hp > 0) boss.textContent = '😰';
            else boss.textContent = '🤡';
        }
        
        function toggleInfinite() {
            infiniteMode = !infiniteMode;
            document.getElementById('btnInfinite').classList.toggle('active', infiniteMode);
            showTaunt(infiniteMode ? "♾️ 无限血条开启！" : "♾️ 无限血条关闭");
        }
        
        function toggleGod() {
            godMode = !godMode;
            document.getElementById('btnGod').classList.toggle('active', godMode);
            showTaunt(godMode ? "🛡️ 无敌模式开启！" : "🛡️ 无敌模式关闭");
        }
        
        function openSkillModal() {
            const editor = document.getElementById('skillEditor');
            editor.innerHTML = '';
            
            skills.forEach((skill, i) => {
                const div = document.createElement('div');
                div.className = 'skill-edit-row';
                div.innerHTML = `
                    <h4>技能${i+1}${skill.ult ? ' (必杀)' : ''}</h4>
                    <input type="text" placeholder="名称" value="${skill.name}" id="sk${i}name">
                    <input type="number" placeholder="伤害" value="${skill.damage}" id="sk${i}dmg">
                    <input type="text" placeholder="图标" value="${skill.icon}" id="sk${i}icon">
                `;
                editor.appendChild(div);
            });
            
            document.getElementById('skillModal').classList.add('active');
        }
        
        function closeSkillModal() {
            skills.forEach((_, i) => {
                skills[i].name = document.getElementById(`sk${i}name`).value || skills[i].name;
                skills[i].damage = parseInt(document.getElementById(`sk${i}dmg`).value) || skills[i].damage;
                skills[i].icon = document.getElementById(`sk${i}icon`).value || skills[i].icon;
            });
            
            generateButtons();
            document.getElementById('skillModal').classList.remove('active');
            showTaunt("⚙️ 技能已更新！");
        }
        
        function endGame(win = true) {
            gameOver = true;
            document.getElementById('battleScreen').classList.remove('active');
            document.getElementById('endScreen').classList.add('active');
            
            const msgs = win ? [
                `${enemyName} 已经被你打到删号退游！`,
                `经过你的"教育"，${enemyName} 再也不敢抢BOSS了！`,
                `${enemyName} 正在世界频道疯狂道歉！`
            ] : [
                `没想到 ${enemyName} 这么顽强...`,
                `虽然你倒下了，但精神永不灭！`
            ];
            
            document.getElementById('endMessage').innerHTML = `
                <p style="font-size: 1.2rem; color: #ccc; line-height: 2;">
                    ${msgs[Math.floor(Math.random() * msgs.length)]}
                </p>
            `;
        }
        
        function restart() {
            enemyHP = 100;
            playerHP = 100;
            combo = 0;
            gameOver = false;
            infiniteMode = false;
            godMode = false;
            
            document.getElementById('btnInfinite').classList.remove('active');
            document.getElementById('btnGod').classList.remove('active');
            
            document.getElementById('endScreen').classList.remove('active');
            document.getElementById('startScreen').classList.add('active');
        }
        
        // 回车开始
        document.getElementById('enemyNameInput').addEventListener('keypress', e => {
            if (e.key === 'Enter') startBattle();
        });
    </script>
</body>
</html>
